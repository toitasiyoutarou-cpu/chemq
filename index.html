<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHEM QUEST｜実験まとめ 二連戦</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="logo">🧪 CHEM QUEST</div>
      <div class="sub">実験まとめ 二連戦：熱分解スライム → CaCO₃ゴーレム</div>
    </div>
    <div class="status">
      <div class="pill" id="stagePill">連戦 1/2</div>
      <div class="pill" id="qPill">問題 1</div>
      <div class="pill hp" id="playerHpTop">あなたHP 100/100</div>
      <div class="pill" id="missPill">❤ ミス 0/3</div>
    </div>
  </header>

  <div class="game">
    <aside class="panel">
      <p class="boss-title">BOSS</p>
      <div class="boss-name" id="bossName"></div>
      <p class="boss-sub" id="bossSub"></p>

      <div class="bar"><div class="fill boss-fill" id="bossHpBar"></div></div>
      <p class="hpText" id="bossHpText"></p>

      <div class="boss-art" id="bossArt">
        <img id="bossImg" src="" alt="boss" />
      </div>

      <div class="panel player playerbox">
        <div class="player-title">⚔ PLAYER：あなた</div>
        <div class="bar"><div class="fill player-fill" id="playerHpBar"></div></div>
        <p class="hpText" id="playerHpText">100 / 100</p>
        <p class="small">攻撃失敗でHP減少。3ミスで敗北。同じ問題に再挑戦できます。</p>
      </div>
    </aside>

    <main class="main">
      <section class="panel">
        <div class="chapter">
          <h1 id="chapterTitle"></h1>
          <span class="tag" id="questionTag"></span>
        </div>
        <div class="data" id="dataBox"></div>
        <div class="formula" id="formulaBox"></div>
      </section>

      <section class="panel">
        <div class="questionNo" id="questionNo">問題 1</div>
        <div class="question" id="questionText"></div>
        <div class="choices" id="choices"></div>

        <div class="actions">
          <button class="action" id="attackBtn">⚔ こうげき！（解答）</button>
          <button class="action next" id="nextBtn">つぎへ →</button>
          <button class="action reset" id="resetBtn">リセット</button>
        </div>

        <div class="result" id="resultBox">選択肢を選んで「こうげき！」を押そう。</div>
      </section>
    </main>
  </div>
  <div class="footer-note">GitHub Pages対応：index.html / style.css / script.js / imgフォルダをそのままアップロード。</div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">LEVEL UP!</h2>
    <p id="modalText"></p>
    <button class="action next" onclick="closeModal()">つづける</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
